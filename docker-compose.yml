version: "3.9"

services:
  # MySQL database
  db:
    image: mysql:8.0
    container_name: ecommerce_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ecommerce
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_USER: ecommerce
      MYSQL_PASSWORD: secret
    volumes:
      - db_data:/var/lib/mysql
    ports:
      - "3306:3306"
    networks:
      - ecommerce

  # Laravel API
  api:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: ecommerce_api
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./server:/var/www
      - ./server/storage:/var/www/storage
    ports:
      - "8000:8000"
    depends_on:
      - db
    environment:
      APP_ENV: local
      APP_KEY: ""
      APP_URL: http://localhost:8000
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: ecommerce
      DB_USERNAME: ecommerce
      DB_PASSWORD: secret
      FRONTEND_URL: http://localhost:3000
    networks:
      - ecommerce

  # React frontend
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: ecommerce_client
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - api
    environment:
      REACT_APP_API_URL: http://localhost:8000
    networks:
      - ecommerce

networks:
  ecommerce:
    driver: bridge

volumes:
  db_data:
